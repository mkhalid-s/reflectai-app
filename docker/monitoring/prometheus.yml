global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'reflectai-monitor'
    environment: '${ENVIRONMENT}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ReflectAI application metrics
  - job_name: 'reflectai-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:8080']
        labels:
          service: 'reflectai'
          component: 'application'

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'reflectai'
          component: 'database'

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'reflectai'
          component: 'cache'

  # Node metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'reflectai'
          component: 'infrastructure'

  # Docker metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['docker-host:9323']
        labels:
          service: 'reflectai'
          component: 'docker'