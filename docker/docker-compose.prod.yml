# Docker Compose Override for Production Environment
# Use with: docker compose -f docker-compose.yml -f docker/docker-compose.prod.yml up

version: '3.9'

services:
  app:
    build:
      target: production
    image: reflectai:production
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
      DEBUG: "false"
    volumes:
      # Remove development volume mounts
      - app_data:/app/data
      - app_logs:/app/logs
      - app_cache:/app/cache
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: reflectai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - reflectai-network
    restart: unless-stopped

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: reflectai-prometheus
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9091:9090"
    networks:
      - reflectai-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: reflectai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - reflectai-network
    restart: unless-stopped

volumes:
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local