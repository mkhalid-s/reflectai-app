name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: Image tag to deploy
        required: true
        default: latest
      apply:
        description: Apply manifests to a cluster using KUBE_CONFIG_B64
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Show deployment plan
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}"
          echo "Apply enabled: ${{ inputs.apply }}"

      - name: Apply manifests when explicitly enabled
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ "${{ inputs.apply }}" != "true" ]; then
            echo "Dry run only. Set apply=true and KUBE_CONFIG_B64 to deploy."
            exit 0
          fi

          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "KUBE_CONFIG_B64 secret is required when apply=true."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          overlay="k8s/overlays/${{ inputs.environment }}"
          if [ ! -f "$overlay/kustomization.yaml" ]; then
            echo "Missing kustomize overlay: $overlay/kustomization.yaml"
            exit 1
          fi

          if [ "${{ inputs.environment }}" = "production" ]; then
            namespace="reflectai"
          else
            namespace="reflectai-${{ inputs.environment }}"
          fi

          kubectl kustomize "$overlay" \
            | sed "s|ghcr.io/reflectai/platform:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}|g" \
            | kubectl apply -f -
          kubectl rollout status deployment/reflectai-app -n "$namespace"
