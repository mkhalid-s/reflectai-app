name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: python -m pip install --upgrade "pdm==2.20.1"

      - name: Install dependencies
        run: pdm install --dev --no-self

      - name: Check dependency lockfile
        run: pdm lock --check

      - name: Compile Python sources
        run: pdm run python -m compileall -q src tests

      - name: Run focused Ruff sanity checks
        run: >-
          pdm run ruff check --select F,E,W,I
          src/core/llm/enterprise_gateway_client.py
          src/core/llm/model_mapper.py
          src/core/llm/providers.py
          src/infrastructure/config/config_manager.py
          tests/test_providers_integration.py
          tests/integration/test_enterprise_gateway_auth.py
          tests/unit/core/llm/test_providers_async_health_checks.py

  targeted-tests:
    name: Targeted Gateway Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: python -m pip install --upgrade "pdm==2.20.1"

      - name: Install dependencies
        run: pdm install --dev --no-self

      - name: Run targeted tests
        run: >-
          pdm run python -m pytest
          tests/test_providers_integration.py
          tests/integration/test_enterprise_gateway_auth.py
          tests/unit/core/llm/test_providers_async_health_checks.py
