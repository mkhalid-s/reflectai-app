name: CI - Tests and Quality Checks

on:
  pull_request:
    branches: [main, feature/*, 0.1.2-alpha]
  push:
    branches: [main, feature/*, 0.1.2-alpha]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: [self-hosted, ccs-runner, ccs-core]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: |
          pip install pdm==2.20.1

      - name: Install dependencies
        run: |
          pdm install --dev

      - name: Run ruff linting
        run: |
          pdm run ruff check src/ tests/

      - name: Run ruff format check
        run: |
          pdm run ruff format --check src/ tests/

  type-check:
    name: Type Checking
    runs-on: [self-hosted, ccs-runner, ccs-core]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: |
          pip install pdm==2.20.1

      - name: Install dependencies
        run: |
          pdm install --dev

      - name: Run mypy type checking
        run: |
          pdm run mypy src/

  security:
    name: Security Scanning
    runs-on: [self-hosted, ccs-runner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: |
          pip install pdm==2.20.1

      - name: Install dependencies
        run: |
          pdm install --dev

      - name: Run bandit security scan
        run: |
          pdm run bandit -r src/ -ll

      - name: Run safety check
        run: |
          pdm run safety check --json || true

  test:
    name: Run Tests
    runs-on: [self-hosted, ccs-runner, ccs-core]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: reflectai
          POSTGRES_PASSWORD: reflectai_test
          POSTGRES_DB: reflectai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        run: |
          pip install pdm==2.20.1

      - name: Install dependencies
        run: |
          pdm install --dev

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://reflectai:reflectai_test@localhost:5432/reflectai_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pdm run pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://reflectai:reflectai_test@localhost:5432/reflectai_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pdm run pytest tests/integration -v --cov=src --cov-append --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  test-summary:
    name: Test Summary
    runs-on: [self-hosted, ccs-runner, ccs-core]
    needs: [lint, type-check, security, test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Some quality checks failed"
            exit 1
          else
            echo "✅ All quality checks passed"
          fi
