apiVersion: v1
kind: Secret
metadata:
  name: reflectai-secrets
  namespace: reflectai
  labels:
    app: reflectai
    component: secrets
type: Opaque
stringData:
  # Database Credentials
  DB_USER: "reflectai_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # JWT Secrets
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_VERY_LONG_SECRET_KEY"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"

  # Encryption Keys
  ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION_32_BYTE_KEY"

  # External API Keys
  OPENAI_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  ANTHROPIC_API_KEY: "CHANGE_ME_IN_PRODUCTION"

  # Slack Integration
  SLACK_BOT_TOKEN: "CHANGE_ME_SLACK_BOT_TOKEN"
  SLACK_APP_TOKEN: "CHANGE_ME_SLACK_APP_TOKEN"
  SLACK_CLIENT_ID: "CHANGE_ME_IN_PRODUCTION"
  SLACK_CLIENT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  SLACK_SIGNING_SECRET: "CHANGE_ME_IN_PRODUCTION"

  # Monitoring and Observability
  DATADOG_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  SENTRY_DSN: "https://CHANGE_ME_IN_PRODUCTION@sentry.io/project"

  # Security
  CSRF_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  WEBHOOK_SECRET: "CHANGE_ME_IN_PRODUCTION"

---
# TLS Certificate Secret (to be populated with actual certificates)
apiVersion: v1
kind: Secret
metadata:
  name: reflectai-tls
  namespace: reflectai
  labels:
    app: reflectai
    component: tls
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # Replace with actual certificates in production
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded private key