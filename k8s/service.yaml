apiVersion: v1
kind: Service
metadata:
  name: reflectai-service
  namespace: reflectai
  labels:
    app: reflectai
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8090
    targetPort: metrics
    protocol: TCP
  - name: health
    port: 8091
    targetPort: health
    protocol: TCP
  selector:
    app: reflectai
    component: backend

---
apiVersion: v1
kind: Service
metadata:
  name: reflectai-nginx-service
  namespace: reflectai
  labels:
    app: reflectai
    component: nginx
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
  - name: metrics
    port: 9113
    targetPort: metrics
    protocol: TCP
  selector:
    app: reflectai
    component: nginx

---
# Headless service for StatefulSet components if needed
apiVersion: v1
kind: Service
metadata:
  name: reflectai-headless
  namespace: reflectai
  labels:
    app: reflectai
    component: headless
spec:
  clusterIP: None
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  selector:
    app: reflectai
    component: backend