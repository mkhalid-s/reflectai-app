apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: reflectai-app-pdb
  namespace: reflectai
  labels:
    app: reflectai
    component: pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: reflectai
      component: backend

