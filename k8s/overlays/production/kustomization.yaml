apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reflectai

resources:
- ../../base
- pvc.yaml
- monitoring.yaml

images:
- name: reflectai/platform
  newName: ghcr.io/reflectai/platform
  newTag: latest

replicas:
- name: reflectai-app
  count: 5
- name: reflectai-nginx
  count: 3

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress-patch.yaml
- hpa-patch.yaml

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: reflectai-app
  path: production-resources-patch.yaml
- target:
    group: autoscaling
    version: v2
    kind: HorizontalPodAutoscaler
    name: reflectai-app-hpa
  path: production-hpa-patch.yaml

configMapGenerator:
- name: reflectai-production-config
  literals:
  - APP_ENV=production
  - LOG_LEVEL=INFO
  - ENABLE_DEBUG_LOGGING=false
  - RATE_LIMIT_REQUESTS_PER_MINUTE=60
  - WORKER_PROCESSES=6
  - MAX_CONNECTIONS_PER_WORKER=150

secretGenerator:
- name: reflectai-production-secrets
  literals:
  - DB_HOST=production-timescaledb-service
  - REDIS_HOST=production-redis-cluster-service

commonLabels:
  environment: production
  version: v1.2

commonAnnotations:
  deployment.kubernetes.io/revision: "1"
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.2"