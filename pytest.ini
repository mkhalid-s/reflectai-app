[pytest]
# Pytest configuration for ReflectAI test suite

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    e2e: End-to-end tests for complete workflows
    slow: Tests that take longer to run
    phase1: Phase 1 - Security-First Foundation tests
    phase2: Phase 2 - AI Agent Foundation tests
    phase3: Phase 3 - Enhanced AI & Integrations tests
    phase4: Phase 4 - Production Infrastructure tests
    phase5: Phase 5 - Tool Framework & Business Logic tests
    performance: Performance benchmark tests
    security: Security-focused tests
    llm: Tests requiring LLM integration (OpenAI, EnterpriseGateway, etc.)
    database: Tests requiring database connectivity (PostgreSQL, TimescaleDB)

# Output settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --maxfail=10

# Coverage settings (if coverage plugin is installed)
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Filtering options
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum version
minversion = 6.0