# ReflectAI Docker Compose Configuration
# Simplified and streamlined for easy development and deployment

version: '3.9'

services:
  # ===============================================================================
  # Main Application
  # ===============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
      args:
        PYTHON_VERSION: "3.11"
        PDM_VERSION: "2.20.1"
    image: reflectai:${IMAGE_TAG:-latest}
    container_name: reflectai-app
    hostname: reflectai-app
    restart: unless-stopped

    ports:
      - "${APP_PORT:-3000}:3000"        # Main app port
      - "${METRICS_PORT:-8080}:8080"    # Metrics port
      - "${HEALTH_CHECK_PORT:-8090}:8090"     # Health check port

    environment:
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}

      # Doppler Configuration (Secrets Management)
      DOPPLER_TOKEN: ${DOPPLER_TOKEN}
      DOPPLER_PROJECT: ${DOPPLER_PROJECT:-reflectai}
      DOPPLER_ENVIRONMENT: ${DOPPLER_ENVIRONMENT:-dev}
      DOPPLER_API_URL: ${DOPPLER_API_URL:-https://api.doppler.com}
      SECRETS_FALLBACK_TO_ENV: ${SECRETS_FALLBACK_TO_ENV:-true}

      # SSL Certificate Configuration (for Zscaler/corporate proxy)
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt

      # Server configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      HEALTH_CHECK_PORT: 8090
      METRICS_PORT: 8080

      # Database - Individual Components (URL built automatically by app)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTO_INITIALIZE_SCHEMA: "true"

      # Redis - Individual Components (URL built automatically by app)
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Temporal - Service Configuration
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_PORT: ${TEMPORAL_PORT}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}

      # Slack configuration
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}

      # LLM configuration
      #OPENAI_API_KEY: ${OPENAI_API_KEY}
      #ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: /app/data

    volumes:
      # Application code (development only)
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./scripts:/app/scripts:ro

      # Persistent data
      - app_data:/app/data
      - app_logs:/app/logs
      - app_cache:/app/cache

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===============================================================================
  # Temporal Worker
  # ===============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
      args:
        PYTHON_VERSION: "3.11"
        PDM_VERSION: "2.20.1"
    image: reflectai:${IMAGE_TAG:-latest}
    container_name: reflectai-worker
    hostname: reflectai-worker
    restart: unless-stopped

    command: ["pdm", "run", "python", "-m", "src.services.workflow.worker"]

    environment:
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}

      # Doppler Configuration (Secrets Management)
      DOPPLER_TOKEN: ${DOPPLER_TOKEN}
      DOPPLER_PROJECT: ${DOPPLER_PROJECT:-reflectai}
      DOPPLER_ENVIRONMENT: ${DOPPLER_ENVIRONMENT:-dev}
      DOPPLER_API_URL: ${DOPPLER_API_URL:-https://api.doppler.com}
      SECRETS_FALLBACK_TO_ENV: ${SECRETS_FALLBACK_TO_ENV:-true}

      # SSL Certificate Configuration (for Zscaler/corporate proxy)
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt

      # Database - Individual Components (URL built automatically by app)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis - Individual Components (URL built automatically by app)
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Temporal - Service Configuration
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_PORT: ${TEMPORAL_PORT}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}

    volumes:
      # Application code (development only)
      - ./src:/app/src:ro
      - ./config:/app/config:ro

      # Persistent data
      - worker_logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ===============================================================================
  # Maintenance Cron Service (Lightweight Alpine-based)
  # ===============================================================================
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    image: reflectai-cron:${IMAGE_TAG:-latest}
    container_name: reflectai-cron
    hostname: reflectai-cron
    restart: unless-stopped

    environment:
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOCKER_CONTAINER: "true"

      # Database - Individual Components
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis - Individual Components
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Slack webhook for alerts (optional)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

    volumes:
      # Maintenance scripts (override built-in scripts for easy development)
      - ./scripts/maintenance:/app/scripts/maintenance:ro

      # Persistent logs
      - cron_logs:/var/log/reflectai
      - ./logs/maintenance:/var/log/reflectai/maintenance

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===============================================================================
  # PostgreSQL Database
  # ===============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: reflectai-postgres
    hostname: postgres
    restart: unless-stopped

    ports:
      - "${DB_PORT:-5432}:5432"

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/01-init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reflectai -d reflectai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===============================================================================
  # Redis Stack Server 7.4 (with RedisJSON for native JSON storage)
  # ===============================================================================
  redis:
    image: redis/redis-stack-server:7.4.0-v1
    container_name: reflectai-redis
    hostname: redis
    restart: unless-stopped

    ports:
      - "${REDIS_PORT:-6379}:6379"

    command: >
      redis-stack-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel ${REDIS_LOG_LEVEL:-notice}

    volumes:
      - redis_data:/data

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD-SHELL", "redis-cli --raw -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD}
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}

  # ===============================================================================
  # Temporal Server (Workflow Orchestration)
  # ===============================================================================
  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: reflectai-temporal
    hostname: temporal
    restart: unless-stopped

    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

    environment:
      - DB=postgresql
      - DB_PORT=${TEMPORAL_DB_PORT}
      - DBNAME=${TEMPORAL_DB_NAME}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - reflectai-network

    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ===============================================================================
  # Temporal Web UI
  # ===============================================================================
  temporal-web:
    image: temporalio/ui:2.21.0
    container_name: reflectai-temporal-web
    hostname: temporal-web
    restart: unless-stopped

    ports:
      - "${TEMPORAL_WEB_PORT:-8088}:8080"

    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000

    depends_on:
      temporal:
        condition: service_healthy

    networks:
      - reflectai-network

# ===============================================================================
# Volumes
# ===============================================================================
volumes:
  app_data:
    driver: local
  app_logs:
    driver: local
  app_cache:
    driver: local
  worker_logs:
    driver: local
  cron_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===============================================================================
# Networks
# ===============================================================================
networks:
  reflectai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16